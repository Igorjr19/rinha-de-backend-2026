services:
  api1:
    build: .
    environment:
      SOCKET_PATH: /sockets/api1.sock
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "140M"

  api2:
    build: .
    environment:
      SOCKET_PATH: /sockets/api2.sock
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "140M"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "70M"

volumes:
  sockets:
    driver_opts:
      type: tmpfs
      device: tmpfs
